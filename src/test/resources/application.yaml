    port: 25
    username: test@test.com
    password: test

  security:
    user:
      name: admin
      password: admin

server:
  servlet:
    context-path: /api/v1

api:
  secret:
    key: test-secret-key-for-testing-only

logging:
  level:
    ROOT: WARN
    fun.trackmoney: INFO
