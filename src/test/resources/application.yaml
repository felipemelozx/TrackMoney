spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/developerDB
    username: developerDB
    password: developerDB
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: none

  flyway:
    enabled: false

  data:
    redis:
      host: localhost
      port: 6379

  cache:
    type: none

  mail:
